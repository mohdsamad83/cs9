<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rogāre — ER Diagram</title>
<style>
  :root {
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #94a3b8;
    --neutral: #e2e8f0;
    --user: #bfdbfe;
    --question: #d1fae5;
    --answer: #fef3c7;
    --comment: #ede0f8;
    --vote: #fce7f3;
    --notif: #e0f2fe;
    --spark: #ffedd5;
    --flag: #fee2e2;
    --log: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #475569;
      --neutral: #1e293b;
      --user: #1e3a5f;
      --question: #064e3b;
      --answer: #451a03;
      --comment: #3b1f5e;
      --vote: #4c1d3a;
      --notif: #0c2d4a;
      --spark: #431a0a;
      --flag: #3b0a0a;
      --log: #1e293b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title { font-size: 18px; font-weight: 700; fill: var(--fg); }
  .subtitle { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .lbl { font-size: 11px; font-weight: 700; fill: var(--fg); }
  .fld { font-size: 10px; fill: var(--muted); }
  .pk { font-size: 9px; fill: #b45309; font-weight: 700; }
  .fk { font-size: 9px; fill: #1d4ed8; font-weight: 600; }
  .enum { font-size: 9px; fill: #6b21a8; }
  .edge { stroke: var(--line); stroke-width: 1.2; fill: none; }
  .edge-dashed { stroke: var(--line); stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
  .zone-label { font-size: 10px; font-weight: 700; fill: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .legend-box { stroke: var(--line); stroke-width: 0.8; fill: var(--neutral); rx: 4; }
  .legend-text { font-size: 10px; fill: var(--muted); }
</style>
<main>
<svg viewBox="0 0 1360 920" xmlns="http://www.w3.org/2000/svg">

 <!-- ═══════════════════════════════════════════ -->
  <!-- ZONE LABELS                                -->

  <text class="zone-label" x="440" y="28">Core Q&A</text>
  <text class="zone-label" x="880" y="28">Engagement & Audit</text>

  <!-- Divided zones -->

  <line x1="870" y1="0" x2="870" y2="920" stroke="var(--line)" stroke-width="0.8" stroke-dasharray="6 4" />

  <!-- ═══════════════════════════════════════════ -->

<text class="pk" x="6" y="36">PK</text><text class="fld" x="22" y="36">user_id</text>
    <text class="fld" x="6" y="48">name</text>
    <text class="fld" x="6" y="60">email</text>

    <text class="fld" x="6" y="108">social_links</text>
    <text class="fld" x="6" y="120">reputation</text>
    <text class="fld" x="6" y="132">phone</text>
    <text class="fld" x="6" y="144">kyc, course, files</text>
    <text class="fld" x="6" y="156">expertise, categories, tags</text>
  </g>

  <!-- USERS → USER_PROFILES (1:1 via user_id) -->
  <path d="M104,224 L104,240" class="edge" />
  <polygon points="104,240100,232 108,232" fill="var(--line)" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- ROLES                                      -->
